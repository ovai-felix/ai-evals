services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aeval}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aeval_dev}
      POSTGRES_DB: ${POSTGRES_DB:-aeval}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./orchestrator/src/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aeval}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    ports:
      - "${ORCHESTRATOR_PORT:-8081}:8081"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://aeval:aeval_dev@db:5432/aeval}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      ORCHESTRATOR_PORT: "8081"
    volumes:
      - ./evals:/app/evals:ro
      - ./datasets:/app/datasets:ro
      - ./registry-data:/app/registry-data
      - ./sdk:/app/sdk:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8081/api/v1/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  registry:
    build:
      context: .
      dockerfile: registry/Dockerfile
    ports:
      - "${REGISTRY_PORT:-8082}:8082"
    volumes:
      - ./registry-data:/app/registry-data:ro
      - ./evals:/app/evals:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8082/api/v1/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  dashboard:
    build:
      context: ./dashboard
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8081}
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    environment:
      API_URL: http://orchestrator:8081
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8081}
    depends_on:
      orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pgdata:
